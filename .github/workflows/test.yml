name: "Test"
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-26.04, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: 'nixpkgs=./nix'
    - name: "Install Cachix"
      uses: cachix/cachix-action@v17
      with:
        name: niv
        signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
    - name: "Run tests"
      run: ./script/test
